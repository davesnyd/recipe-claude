spring:
  application:
    name: recipe-backend
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/recipe_app}
    username: ${SPRING_DATASOURCE_USERNAME:recipe_user}
    password: ${SPRING_DATASOURCE_PASSWORD:recipe_password}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/oauth2/callback/{registrationId}"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: email

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${JWT_SECRET:myVerySecureSecretKeyForHS512AlgorithmThatIsLongEnoughToMeetTheRequirementsOfAtLeast512BitsForSecurityPurposes123456789}
    expiration: 86400000 # 24 hours
  
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  
  file-upload:
    dir: ${FILE_UPLOAD_DIR:./uploads}

logging:
  level:
    com.recipe: DEBUG
    org.springframework.security: DEBUG